services:
  homepage:
    image: ghcr.nju.edu.cn/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped

    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - HOMEPAGE_ALLOWED_HOSTS=${HOST_IP}:3000,homepage.${DOMAIN}
    volumes:
      - ${DATA_DIR:-/srv/media}/config/homepage/data:/app/data
      - ${DATA_DIR:-/srv/media}/config/homepage/config:/app/config
      - /sys:/sys:ro
      - ./public/images:/app/public/images
    networks:
      family-network:
        ipv4_address: ${HOMEPAGE_IP}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  family-network:
    external: true
