services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped

    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - JELLYFIN_PublishedServerUrl=http://${HOST_IP}
      - JELLYFIN_StrictSSL=false
      - JELLYFIN_EnableApiAccess=true
      - JELLYFIN_EnableWebSocket=true
    volumes:
      - ${DATA_DIR:-/srv/media}/config/jellyfin:/config
      - ${DATA_DIR:-/srv/media}/cache/jellyfin:/cache
      - ${DATA_DIR:-/srv/media}/media:/media
      - ./fonts:/usr/share/fonts/truetype
    devices:
      - /dev/dri:/dev/dri
    networks:
      - family-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8096/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  family-network:
    external: true
