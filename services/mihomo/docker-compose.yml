services:
  metacubexd:
    container_name: metacubexd
    image: ghcr.nju.edu.cn/metacubex/metacubexd
    restart: always
    environment:
      - DEFAULT_BACKEND_URL=http://${HOST_IP}:9090
    volumes:
      - ./config:/root/.config/mihomo
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      family-network:
        ipv4_address: ${METACUBEXD_IP}

  mihomo:
    container_name: mihomo
    image: metacubex/mihomo:Alpha
    restart: always
    networks:
      family-network:
        ipv4_address: ${MIHOMO_IP}
    ports:
      - "7890:7890"
      - "7891:7891"
      - "9090:9090"
    volumes:
      - ./config:/root/.config/mihomo/
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9090 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  family-network:
    external: true
