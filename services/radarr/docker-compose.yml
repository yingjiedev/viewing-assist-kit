services:
  radarr:
    image: ghcr.nju.edu.cn/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    depends_on:
      prowlarr:
        condition: service_healthy
      transmission:
        condition: service_healthy

    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - RADARR_EnableWebSocket=true
      - RADARR_EnableApiAccess=true
    volumes:
      - ${DATA_DIR:-/srv/media}/config/radarr:/config
      - ${DATA_DIR:-/srv/media}/media/movies:/movies
      - ${DATA_DIR:-/srv/media}/downloads:/downloads
    networks:
      - family-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7878/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  family-network:
    external: true
