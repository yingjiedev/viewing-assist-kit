services:
  sonarr:
    image: ghcr.nju.edu.cn/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    depends_on:
      prowlarr:
        condition: service_healthy
      transmission:
        condition: service_healthy

    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - SONARR_EnableWebSocket=true
      - SONARR_EnableApiAccess=true
    volumes:
      - ${DATA_DIR:-/srv/media}/config/sonarr:/config
      - ${DATA_DIR:-/srv/media}/media/tv:/tv
      - ${DATA_DIR:-/srv/media}/downloads:/downloads
      - ${DATA_DIR:-/srv/media}/cache/sonarr:/transcodes
    devices:
      - /dev/dri:/dev/dri
    networks:
      - family-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8989/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  family-network:
    external: true
