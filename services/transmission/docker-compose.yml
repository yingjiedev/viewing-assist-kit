services:
  transmission:
    image: ghcr.nju.edu.cn/linuxserver/transmission:latest
    container_name: transmission
    restart: unless-stopped
    ports:
      - "51413:51413"
      - "51413:51413/udp"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - USERNAME=${TRANSMISSION_USERNAME:-admin}
      - PASSWORD=${TRANSMISSION_PASSWORD}
    volumes:
      - ${DATA_DIR:-/srv/media}/config/transmission:/config
      - ${DATA_DIR:-/srv/media}/downloads:/downloads
      - ${DATA_DIR:-/srv/media}/watch:/watch
    networks:
      - family-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  family-network:
    external: true
