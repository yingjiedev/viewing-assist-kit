services:
  transmission:
    image: ghcr.nju.edu.cn/linuxserver/transmission:latest
    container_name: transmission
    restart: unless-stopped
    ports:
      - "51413:51413"        # BT 端口
      - "51413:51413/udp"
    environment:
      - TZ=${TZ:-Etc/UTC}
      - PUID=0
      - PGID=0
      - USERNAME=${TRANSMISSION_USERNAME:-admin}
      - PASSWORD=${TRANSMISSION_PASSWORD:-password}
    volumes:
      - ./config:/config
      - /path/to/downloads:/downloads
      - ./watch:/watch
    networks:
      family-network:
        ipv4_address: ${TRANSMISSION_IP}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  family-network:
    external: true
